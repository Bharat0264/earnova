version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: earnova_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: earnova
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - earnova_net

  # ── Express API ──────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: earnova_server
    restart: always
    env_file: ./server/.env
    environment:
      NODE_ENV:  production
      PORT:      5000
      MONGO_URI: mongodb://mongodb:27017/earnova
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - earnova_net

  # ── React + Nginx ─────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: earnova_client
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - earnova_net

networks:
  earnova_net:
    driver: bridge

volumes:
  mongo_data:
    name: earnova_mongo_data
